<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>提问管理 - ChatGPT 提问助手</title>
  <link rel="stylesheet" href="src/manager.css">
</head>
<body>
  <main class="manager-shell">
    <header class="manager-header">
      <div>
        <p class="eyebrow">ChatGPT 提问助手</p>
        <h1>提问管理</h1>
      </div>
      <button id="refresh" class="ghost-button" type="button">刷新</button>
    </header>

    <section class="manager-grid" aria-live="polite">
      <aside class="conversation-panel">
        <div class="panel-title-row">
          <h2>会话</h2>
          <span id="conversation-count" class="soft-tag">0</span>
        </div>
        <div id="conversation-list" class="conversation-list"></div>
      </aside>

      <section class="thread-panel">
        <div id="thread-empty" class="empty-state">
          <h2>暂无提问记录</h2>
          <p>在 ChatGPT 回复中划选内容并发送追问后，记录会显示在这里。</p>
        </div>
        <div id="thread-detail" class="thread-detail" hidden></div>
      </section>
    </section>
  </main>

  <template id="conversation-template">
    <button class="conversation-item" type="button">
      <span class="conversation-title"></span>
      <span class="conversation-meta"></span>
    </button>
  </template>

  <script src="src/storage.js"></script>
  <script src="src/manager.js"></script>
</body>
</html>
