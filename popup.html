<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI 提问助手</title>
  <link rel="stylesheet" href="src/theme.css">
  <link rel="stylesheet" href="src/popup.css">
</head>
<body>
  <main class="popup-shell">
    <header class="popup-header">
      <div class="popup-mark">问</div>
      <div>
        <h1>AI 提问助手</h1>
        <p>管理本地保存的提问记录</p>
      </div>
    </header>
    <button id="open-manager" class="popup-action" type="button">
      <span>打开提问管理</span>
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M7 17 17 7"></path>
        <path d="M9 7h8v8"></path>
      </svg>
    </button>
    <div class="popup-command-row">
      <button id="repair-page" class="popup-action popup-action-secondary" type="button">
        <span>整理当前页面</span>
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M3 12a9 9 0 0 1 14.7-7"></path>
          <path d="M17 4v5h-5"></path>
          <path d="M21 12a9 9 0 0 1-14.7 7"></path>
          <path d="M7 20v-5h5"></path>
        </svg>
      </button>
      <span id="repair-help" class="popup-help popup-command-help" title="尝试恢复引用标记，并隐藏或卸载插件发送到主对话里的临时问答。"></span>
    </div>
    <div id="repair-status" class="popup-status" role="status" aria-live="polite"></div>
    <section class="popup-provider-card" aria-labelledby="provider-title">
      <div class="popup-section-title" id="provider-title">启用页面</div>
      <div id="provider-list" class="popup-provider-list"></div>
    </section>
    <label class="popup-theme">
      <span>主题色</span>
      <select id="theme-select" aria-label="主题色"></select>
    </label>
  </main>
  <script src="src/theme.js"></script>
  <script src="src/storage.js"></script>
  <script src="src/popup.js"></script>
</body>
</html>
